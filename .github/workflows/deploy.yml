name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'shared/**'
      - 'docker/**'
      - 'helm/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/hankel-ai/container-image-compare:${{ github.sha }}
            ghcr.io/hankel-ai/container-image-compare:latest

  deploy:
    needs: build
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Deploy to K3s
        run: |
          helm upgrade --install container-image-compare \
            ./helm/container-image-compare \
            --namespace container-image-compare \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 10m
