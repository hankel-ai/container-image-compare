# Container Image Compare - Docker Compose Configuration
# 
# Usage:
#   docker compose up -d        # Start in background
#   docker compose logs -f      # View logs
#   docker compose down         # Stop and remove containers
#   docker compose down -v      # Stop and remove containers + volumes
#
# Environment Variables (optional):
#   HTTP_PROXY / HTTPS_PROXY    - Proxy URL for registry connections
#   CIC_PORT                    - Port to expose (default: 5000)
#   CIC_DATA_DIR                - Host path for data (default: ./data)
#

name: container-image-compare

services:
  container-image-compare:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    image: container-image-compare:latest
    container_name: container-image-compare
    restart: unless-stopped
    
    ports:
      - "${CIC_PORT:-5000}:5000"
    
    environment:
      # Application settings
      - NODE_ENV=production
      - PORT=5000
      - APP_DATA_DIR=/app/appdata
      
      # Proxy settings (optional - uncomment and set if needed)
      # These environment variables are read by the application for registry connections
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      
      # Cache settings (optional)
      - MAX_CACHE_SIZE_GB=${MAX_CACHE_SIZE_GB:-20}
      - MAX_HISTORY_ITEMS=${MAX_HISTORY_ITEMS:-20}
      
      # Credential encryption key (optional - generated automatically if not set)
      # Generate with: openssl rand -base64 32
      - CIC_CRED_KEY=${CIC_CRED_KEY:-}
    
    volumes:
      # Persistent data volume
      - data:/app/appdata
    
    # Privileged mode required for Podman to run inside Docker
    # This enables the container terminal feature
    privileged: true
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits (optional - adjust based on your needs)
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M

#Use a Docker Volume
volumes:
  data:
    driver: local

