apiVersion: v1
kind: Service
metadata:
  name: container-image-compare #{{ include "container-image-compare.fullname" . }}
  labels:
    {{- include "container-image-compare.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "container-image-compare.selectorLabels" . | nindent 4 }}
