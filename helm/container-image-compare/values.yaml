# Container Image Compare Helm Chart Values
# Default values for container-image-compare

# Number of replicas
replicaCount: 1

# Image configuration
image:
  repository: ghcr.io/hankel-ai/container-image-compare
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion
  tag: latest

# Image pull secrets for private registries
imagePullSecrets: []

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 0

# Container security context
# NOTE: Privileged mode is required for the container terminal feature (Podman)
# If you don't need the terminal feature, you can set privileged: false
securityContext:
  runAsNonRoot: false
  runAsUser: 0
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: true
  privileged: true
  capabilities:
    add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE

# Service configuration
service:
  type: ClusterIP
  port: 5000

# Ingress configuration
ingress:
  enabled: true
  # Use cluster's default ingress class if not specified
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-hankel
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "6000"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "6000"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "6000"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
  hosts:
    - host: cic.hankel.ai
      paths:
        - path: /
          pathType: Prefix
  tls: 
   - secretName: container-image-compare-tls
     hosts:
       - cic.hankel.ai

# Resource limits and requests
resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 4Gi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Persistent Volume Claim for application data
persistence:
  enabled: true
  # Use cluster's default storage class if not specified
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 100Gi
  # Annotations for the PVC
  annotations: {}
  # Existing claim to use (if set, a new PVC will not be created)
  existingClaim: ""

# Application configuration
config:
  # Port the application listens on (inside the container)
  port: 5000
  
  # Maximum cache size in GB
  maxCacheSizeGB: 80
  
  # Maximum history items to retain
  maxHistoryItems: 20
  
  # Skip TLS verification for self-signed certificates
  skipTlsVerify: false
  
  # Enable debug logging
  debugLogging: true
  
  # Comma-separated list of insecure registries (HTTP instead of HTTPS)
  # Example: "localhost:5000,my-registry.internal:5000"
  insecureRegistries: ""

# Proxy configuration
proxy:
  # HTTP proxy URL (e.g., http://proxy.example.com:8080)
  httpProxy: ""
  # HTTPS proxy URL (usually same as httpProxy)
  httpsProxy: ""
  # Comma-separated list of hosts to bypass proxy
  noProxy: ""

# Credential encryption key (base64 encoded 32-byte key)
# Generate with: openssl rand -base64 32
# If not set, a default machine-specific key will be used
credentialKey: ""

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Extra environment variables
extraEnv: []
#  - name: EXTRA_VAR
#    value: "extra-value"

# Extra volume mounts
extraVolumeMounts: []

# Extra volumes
extraVolumes: []
