<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e" />
  
  <!-- Left container (blue) -->
  <g filter="url(#shadow)">
    <!-- Container body -->
    <rect x="60" y="140" width="160" height="200" rx="12" fill="url(#gradient1)" />
    <!-- Container lines (docker-style) -->
    <rect x="80" y="170" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="80" y="200" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="80" y="230" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="80" y="260" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="80" y="290" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
  </g>
  
  <!-- Right container (green) -->
  <g filter="url(#shadow)">
    <!-- Container body -->
    <rect x="292" y="140" width="160" height="200" rx="12" fill="url(#gradient2)" />
    <!-- Container lines (docker-style) -->
    <rect x="312" y="170" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="312" y="200" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="312" y="230" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="312" y="260" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
    <rect x="312" y="290" width="120" height="20" rx="4" fill="rgba(255,255,255,0.3)" />
  </g>
  
  <!-- Compare arrows in center -->
  <g fill="#ffffff">
    <!-- Left arrow -->
    <path d="M230 220 L260 240 L230 260 L230 250 L245 240 L230 230 Z" />
    <!-- Right arrow -->
    <path d="M282 220 L252 240 L282 260 L282 250 L267 240 L282 230 Z" />
  </g>
  
  <!-- Diff indicator dots -->
  <circle cx="200" cy="375" r="12" fill="#FF9800" />
  <circle cx="256" cy="375" r="12" fill="#4CAF50" />
  <circle cx="312" cy="375" r="12" fill="#f44336" />
</svg>
